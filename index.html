<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }

        code,
        .mono {
            font-family: 'DM Mono', monospace;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .page {
            min-height: 100vh;
        }
    </style>
</head>


<body class="bg-gray-50">

    <!-- login -->
    <div id="loginPage" class="page login-bg flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">

            <!-- Logo & Title -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center mb-4 shadow-md">
                    <i class="fa-brands fa-github text-white text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="flex flex-col gap-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username" type="text" placeholder="Enter Username"
                        class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
                    <p class="text-xs text-indigo-500 mt-1">Default: admin</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" type="password" placeholder="Enter Password"
                        class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
                    <p class="text-xs text-indigo-500 mt-1">Default: admin123</p>
                </div>

                <!-- Error -->
                <p id="loginError" class="hidden text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></p>

                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-3 rounded-lg transition-colors mt-1">
                    Sign In
                </button>

                <!-- Demo credentials -->
                <div class="relative flex items-center gap-2 my-1">
                    <div class="flex-1 border-t border-gray-200"></div>
                    <span class="text-xs text-gray-400 font-medium">OR</span>
                    <div class="flex-1 border-t border-gray-200"></div>
                </div>
                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-2">Demo Credentials:</p>
                    <div
                        class="bg-gray-50 border border-gray-100 rounded-lg p-3 text-sm mono text-gray-700 text-left inline-block w-full">
                        <p><span class="font-semibold">Username:</span> admin</p>
                        <p><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>

            </form>
        </div>
    </div>


</body>

</html>
